[phases.setup]
nixPkgs = ['...', 'php84', 'php84Extensions.pdo', 'php84Extensions.pdo_mysql', 'php84Extensions.mbstring', 'php84Extensions.openssl', 'php84Extensions.tokenizer', 'php84Extensions.xml', 'php84Extensions.ctype', 'php84Extensions.curl', 'php84Extensions.dom', 'php84Extensions.fileinfo', 'php84Extensions.filter', 'php84Extensions.session']

[phases.install]
cmds = ['composer install --no-dev --optimize-autoloader']

[start]
cmd = 'php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=$PORT'
